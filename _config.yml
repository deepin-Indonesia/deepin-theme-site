# deepin Theme Site — Jekyll theme gem untuk semua situs deepin Indonesia
# Digunakan sebagai submodule di: home-site, download-site, news-site, dll.

# Default site identity (bisa di-override per repo)
title: deepin Indonesia
tagline: Komunitas Resmi Pengguna deepin Linux di Indonesia
description: >-
  deepin Indonesia adalah komunitas resmi pengguna dan pengembang deepin Linux di Indonesia.

# Build settings
markdown: kramdown

# Sass
sass:
  style: compressed

# Exclude from theme
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - deepin-theme-site.gemspec
  - .gitignore
